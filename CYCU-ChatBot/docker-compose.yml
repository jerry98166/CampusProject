version: '3.8'

services:
  cycu-chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cycu-chatbot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=8080
    env_file:
      - .env
    volumes:
      # 掛載向量資料庫（持久化）
      - ./data/vector_store:/app/data/vector_store
      # 掛載 PDF 資料
      - ./data/raw:/app/data/raw
      # 掛載日誌
      - ./logs:/app/logs
    networks:
      - cycu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  cycu-network:
    driver: bridge

volumes:
  vector_store_data:
  logs_data:
